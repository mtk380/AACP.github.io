<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AACP 中文白皮书</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown.min.css"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #eef3ff;
        --panel: rgba(255, 255, 255, 0.88);
        --panel-border: rgba(148, 163, 184, 0.3);
        --text-main: #0f172a;
        --text-muted: #475569;
        --brand: #2563eb;
        --shadow: 0 18px 44px rgba(15, 23, 42, 0.11);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background:
          radial-gradient(circle at 20% 10%, rgba(147, 197, 253, 0.36), transparent 32%),
          radial-gradient(circle at 86% 20%, rgba(129, 140, 248, 0.2), transparent 30%),
          var(--bg);
        color: var(--text-main);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", "Helvetica Neue", Arial, sans-serif;
      }
      .layout {
        display: grid;
        grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
        min-height: 100vh;
        gap: 14px;
        padding: 14px;
      }
      .sidebar {
        border: 1px solid var(--panel-border);
        background: var(--panel);
        border-radius: 18px;
        padding: 18px 12px 14px;
        position: sticky;
        top: 14px;
        max-height: calc(100vh - 28px);
        overflow: auto;
        box-shadow: var(--shadow);
      }
      .brand {
        margin: 0;
        font-size: 24px;
        letter-spacing: -0.02em;
      }
      .brand-note {
        margin: 8px 0 14px;
        color: var(--text-muted);
        font-size: 13px;
        line-height: 1.55;
      }
      .sidebar-title {
        margin: 0 0 8px;
        font-size: 13px;
        color: var(--text-muted);
      }
      .toc {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 6px;
      }
      .toc-link {
        display: block;
        border-radius: 10px;
        padding: 9px 11px;
        line-height: 1.4;
        color: #1f2937;
        text-decoration: none;
        font-size: 14px;
        border: 1px solid transparent;
        transition: all 0.16s ease;
      }
      .toc-link:hover {
        background: rgba(37, 99, 235, 0.08);
        border-color: rgba(37, 99, 235, 0.22);
        transform: translateX(2px);
      }
      .toc-link.active {
        background: linear-gradient(135deg, rgba(219, 234, 254, 0.95), rgba(224, 242, 254, 0.95));
        color: #1d4ed8;
        font-weight: 700;
        border-color: rgba(37, 99, 235, 0.25);
      }
      .content-wrap {
        min-width: 0;
      }
      .toolbar {
        position: sticky;
        top: 14px;
        z-index: 10;
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid var(--panel-border);
        border-radius: 14px;
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px 12px;
        flex-wrap: wrap;
        padding: 10px 14px;
        margin-bottom: 14px;
      }
      .toolbar a {
        color: #1d4ed8;
        text-decoration: none;
        font-size: 14px;
        border: 1px solid rgba(37, 99, 235, 0.24);
        border-radius: 999px;
        padding: 6px 11px;
        background: rgba(255, 255, 255, 0.65);
        transition: all 0.16s ease;
      }
      .toolbar a:hover {
        background: rgba(37, 99, 235, 0.12);
      }
      .meta {
        color: var(--text-muted);
        font-size: 12px;
        background: rgba(226, 232, 240, 0.55);
        border-radius: 999px;
        padding: 6px 10px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 100%;
      }
      .markdown-body {
        max-width: 1100px;
        margin: 0 auto 18px;
        padding: 28px 32px;
        background: #ffffff;
        border: 1px solid var(--panel-border);
        border-radius: 18px;
        box-shadow: 0 14px 36px rgba(15, 23, 42, 0.08);
        line-height: 1.8;
      }
      .markdown-body img {
        border-radius: 10px;
      }
      .markdown-body pre {
        border-radius: 10px;
      }
      .markdown-body blockquote {
        border-left-color: #60a5fa;
      }
      .toolbar-links {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }
      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
          gap: 10px;
          padding: 10px;
        }
        .sidebar {
          position: static;
          max-height: none;
          top: auto;
        }
        .markdown-body {
          margin: 0;
          padding: 18px 16px;
          border-radius: 14px;
        }
        .toolbar {
          top: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1 class="brand">AACP 白皮书</h1>
        <p class="brand-note">中文章节阅读 · GitBook 风格导航</p>
        <h2 class="sidebar-title">章节列表</h2>
        <ul class="toc" id="toc"></ul>
      </aside>

      <main class="content-wrap">
        <div class="toolbar">
          <div class="toolbar-links">
            <a href="../">语言选择</a>
            <a href="../en/">English</a>
            <a id="repoLink" target="_blank" rel="noreferrer">在 GitHub 查看当前文件</a>
          </div>
          <span class="meta" id="meta"></span>
        </div>
        <article class="markdown-body" id="content">加载中...</article>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const CHAPTERS = [
        ["1. 执行摘要与问题机遇", "gitbook-zh/01-executive-summary.md"],
        ["2. 设计哲学：三大原则", "gitbook-zh/03-design-philosophy.md"],
        ["3. 协议架构总览", "gitbook-zh/04-architecture-overview.md"],
        ["4. AMX：Agent 交易市场", "gitbook-zh/05-amx-marketplace.md"],
        ["5. AAP：行动问责协议", "gitbook-zh/06-aap-accountability.md"],
        ["6. WEAVE：多 Agent 协调引擎", "gitbook-zh/07-weave-coordination.md"],
        ["7. Capability-UTXO 模型", "gitbook-zh/08-capability-utxo.md"],
        ["8. 法币原生经济模型", "gitbook-zh/09-fiat-economics.md"],
        ["9. 节点分层与网络拓扑", "gitbook-zh/10-node-topology.md"],
        ["10. 信誉系统", "gitbook-zh/11-reputation-system.md"],
        ["11. 争议仲裁与反欺诈", "gitbook-zh/12-arbitration-anti-fraud.md"],
        ["12. 安全架构", "gitbook-zh/13-security-architecture.md"],
        ["13. 治理与演进", "gitbook-zh/15-governance-evolution.md"],
        ["14. 结语", "gitbook-zh/17-conclusion.md"]
      ];

      const toc = document.getElementById("toc");
      const content = document.getElementById("content");
      const meta = document.getElementById("meta");
      const repoLink = document.getElementById("repoLink");
      const query = new URLSearchParams(window.location.search);
      const defaultFile = "gitbook-zh/01-executive-summary.md";
      let currentFile = query.get("file") || defaultFile;

      function isSafeFilePath(path) {
        return /^[A-Za-z0-9._/-]+$/.test(path) && !path.includes("..") && path.endsWith(".md");
      }

      function setActive(file) {
        document.querySelectorAll("[data-file]").forEach((element) => {
          element.classList.toggle("active", element.dataset.file === file);
        });
      }

      function toReaderUrl(file) {
        return `?file=${encodeURIComponent(file)}`;
      }

      function resolveMarkdownPath(baseFile, href) {
        const [rawPath, rawHash] = href.split("#");
        if (!rawPath) {
          return null;
        }
        const baseDir = baseFile.includes("/") ? baseFile.slice(0, baseFile.lastIndexOf("/") + 1) : "";
        const merged = rawPath.startsWith("/") ? rawPath.slice(1) : `${baseDir}${rawPath}`;
        const parts = [];
        for (const part of merged.split("/")) {
          if (!part || part === ".") {
            continue;
          }
          if (part === "..") {
            if (!parts.length) {
              return null;
            }
            parts.pop();
            continue;
          }
          parts.push(part);
        }
        const file = parts.join("/");
        if (!/^[A-Za-z0-9._/-]+$/.test(file) || file.includes("..")) {
          return null;
        }
        const hash = rawHash ? `#${rawHash}` : "";
        return { file, hash };
      }

      function buildToc() {
        toc.innerHTML = CHAPTERS.map(([title, file]) => {
          return `<li><a class="toc-link" data-file="${file}" href="${toReaderUrl(file)}">${title}</a></li>`;
        }).join("");
      }

      function normalizeMarkdownLinks(container, baseFile) {
        container.querySelectorAll("a").forEach((link) => {
          const href = link.getAttribute("href");
          if (!href || href.startsWith("#") || href.startsWith("http://") || href.startsWith("https://")) {
            return;
          }
          if (href.includes(".md")) {
            const resolved = resolveMarkdownPath(baseFile, href);
            if (!resolved) {
              return;
            }
            if (!isSafeFilePath(resolved.file)) {
              return;
            }
            link.setAttribute("href", `${toReaderUrl(resolved.file)}${resolved.hash}`);
            link.dataset.file = resolved.file;
            if (resolved.hash) {
              link.dataset.hash = resolved.hash;
            }
          }
        });
      }

      function normalizeMarkdownImages(container, baseFile) {
        container.querySelectorAll("img").forEach((img) => {
          const src = img.getAttribute("src");
          if (!src || src.startsWith("http://") || src.startsWith("https://") || src.startsWith("data:")) {
            return;
          }
          const resolved = resolveMarkdownPath(baseFile, src);
          if (!resolved) {
            return;
          }
          if (!/\.(png|jpe?g|webp|gif|svg)$/i.test(resolved.file)) {
            return;
          }
          img.setAttribute("src", `../${resolved.file}`);
          if (!img.getAttribute("loading")) {
            img.setAttribute("loading", "lazy");
          }
        });
      }

      function scrollToAnchor(hash) {
        if (!hash || !hash.startsWith("#")) {
          return;
        }
        const id = decodeURIComponent(hash.slice(1));
        const target = document.getElementById(id);
        if (target) {
          target.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }

      async function loadMarkdown(file, pushState, hash = "") {
        if (!isSafeFilePath(file)) {
          meta.textContent = "非法文件路径";
          content.textContent = "文件路径非法。";
          return;
        }
        currentFile = file;
        if (pushState) {
          window.history.pushState({ file, hash }, "", `${toReaderUrl(file)}${hash}`);
        }
        setActive(file);
        meta.textContent = `当前文档：${file}`;
        const githubUrl = `https://github.com/mtk380/AACP.github.io/blob/main/${file}`;
        repoLink.href = githubUrl;

        try {
          const response = await fetch(`../${file}`);
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const markdown = await response.text();
          marked.setOptions({ breaks: true, gfm: true });
          content.innerHTML = marked.parse(markdown);
          normalizeMarkdownLinks(content, file);
          normalizeMarkdownImages(content, file);
          scrollToAnchor(hash);
        } catch (error) {
          content.innerHTML = `<p>文档加载失败：${error.message}</p><p><a href="${githubUrl}" target="_blank" rel="noreferrer">点击在 GitHub 查看</a></p>`;
        }
      }

      buildToc();

      document.addEventListener("click", (event) => {
        const link = event.target.closest("a[data-file]");
        if (!link) {
          return;
        }
        event.preventDefault();
        const file = link.dataset.file;
        const hash = link.dataset.hash || "";
        loadMarkdown(file, true, hash);
      });

      window.addEventListener("popstate", () => {
        const file = new URLSearchParams(window.location.search).get("file") || defaultFile;
        const hash = window.location.hash || "";
        loadMarkdown(file, false, hash);
      });

      loadMarkdown(currentFile, false, window.location.hash || "");
    </script>
  </body>
</html>
