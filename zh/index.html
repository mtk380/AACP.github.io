<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AACP 中文白皮书</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown.min.css"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f9fc;
        --panel: #ffffff;
        --panel-soft: #f9fbff;
        --border: #e5e7eb;
        --text-main: #111827;
        --text-muted: #6b7280;
        --brand: #346ddb;
        --brand-soft: #eff6ff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text-main);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", "Helvetica Neue", Arial, sans-serif;
      }
      .site-header {
        position: sticky;
        top: 0;
        z-index: 40;
        height: 60px;
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(8px);
      }
      .site-header-inner {
        height: 100%;
        max-width: 1620px;
        margin: 0 auto;
        padding: 0 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .brand-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #1f2937;
        font-weight: 600;
        text-decoration: none;
      }
      .brand-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--brand);
      }
      .header-links {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .header-links a {
        text-decoration: none;
        color: #334155;
        font-size: 13px;
        padding: 6px 10px;
        border-radius: 8px;
      }
      .header-links a:hover {
        background: #f3f4f6;
      }
      .layout {
        max-width: 1620px;
        margin: 0 auto;
        padding: 20px 18px 28px;
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr) 250px;
        gap: 18px;
        align-items: start;
      }
      .sidebar,
      .outline {
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--panel);
        position: sticky;
        top: 78px;
        max-height: calc(100vh - 94px);
        overflow: auto;
      }
      .sidebar {
        padding: 14px 10px;
      }
      .sidebar .brand {
        margin: 0;
        padding: 0 8px;
        font-size: 22px;
        letter-spacing: -0.02em;
      }
      .sidebar-note {
        margin: 6px 8px 12px;
        color: var(--text-muted);
        font-size: 12px;
      }
      .sidebar-title {
        margin: 0 8px 8px;
        font-size: 12px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .toc {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 5px;
      }
      .toc-link {
        display: block;
        border-radius: 9px;
        padding: 8px 10px;
        line-height: 1.4;
        color: #1f2937;
        text-decoration: none;
        font-size: 14px;
        border: 1px solid transparent;
      }
      .toc-link:hover {
        background: #f3f7ff;
        border-color: #dbe7ff;
      }
      .toc-link.active {
        background: var(--brand-soft);
        border-color: #bfdbfe;
        color: #1d4ed8;
        font-weight: 600;
      }
      .content-wrap {
        min-width: 0;
      }
      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.95);
        padding: 10px 12px;
        position: sticky;
        top: 74px;
        z-index: 20;
        backdrop-filter: blur(6px);
      }
      .toolbar-links {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }
      .toolbar a {
        color: #1d4ed8;
        text-decoration: none;
        font-size: 13px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid #dbeafe;
        background: #f8fbff;
      }
      .toolbar a:hover {
        background: #eff6ff;
      }
      .meta {
        color: var(--text-muted);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
      }
      .markdown-body {
        margin: 14px auto 0;
        max-width: 920px;
        padding: 28px 30px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: #fff;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
        line-height: 1.82;
      }
      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3 {
        scroll-margin-top: 130px;
      }
      .markdown-body pre {
        border-radius: 10px;
      }
      .markdown-body blockquote {
        border-left-color: #93c5fd;
      }
      .outline {
        padding: 14px 10px;
        background: var(--panel-soft);
      }
      .outline-title {
        margin: 0 8px 8px;
        font-size: 12px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .outline-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 4px;
      }
      .outline-item.level-h3 {
        padding-left: 10px;
      }
      .outline-link {
        display: block;
        padding: 6px 8px;
        border-radius: 8px;
        border: 1px solid transparent;
        color: #4b5563;
        font-size: 13px;
        text-decoration: none;
        line-height: 1.38;
      }
      .outline-link:hover {
        background: #eff6ff;
        border-color: #dbeafe;
        color: #1d4ed8;
      }
      .outline-link.active {
        background: #eff6ff;
        border-color: #bfdbfe;
        color: #1d4ed8;
        font-weight: 600;
      }
      .outline-empty {
        color: var(--text-muted);
        font-size: 12px;
        padding: 6px 8px;
      }
      @media (max-width: 1280px) {
        .layout {
          grid-template-columns: 280px minmax(0, 1fr);
        }
        .outline {
          display: none;
        }
      }
      @media (max-width: 980px) {
        .site-header {
          height: auto;
          position: static;
        }
        .site-header-inner {
          min-height: 56px;
          padding: 10px 12px;
        }
        .layout {
          grid-template-columns: 1fr;
          padding: 12px;
        }
        .sidebar,
        .outline {
          position: static;
          max-height: none;
        }
        .toolbar {
          position: static;
        }
        .markdown-body {
          margin-top: 10px;
          padding: 18px 14px;
          border-radius: 12px;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="brand-link" href="../">
          <span class="brand-dot"></span>
          <span>AACP Docs</span>
        </a>
        <nav class="header-links">
          <a href="../zh/">中文</a>
          <a href="../en/">English</a>
        </nav>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <h1 class="brand">AACP 白皮书</h1>
        <p class="sidebar-note">GitBook 风格阅读布局</p>
        <h2 class="sidebar-title">章节列表</h2>
        <ul class="toc" id="toc"></ul>
      </aside>

      <main class="content-wrap">
        <div class="toolbar">
          <div class="toolbar-links">
            <a href="../">语言选择</a>
            <a href="../en/">English</a>
            <a id="repoLink" target="_blank" rel="noreferrer">在 GitHub 查看当前文件</a>
          </div>
          <span class="meta" id="meta"></span>
        </div>
        <article class="markdown-body" id="content">加载中...</article>
      </main>

      <aside class="outline">
        <h2 class="outline-title">本页目录</h2>
        <ul class="outline-list" id="outline"></ul>
      </aside>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const CHAPTERS = [
        ["1. 执行摘要与问题机遇", "gitbook-zh/01-executive-summary.md"],
        ["2. 设计哲学：三大原则", "gitbook-zh/03-design-philosophy.md"],
        ["3. 协议架构总览", "gitbook-zh/04-architecture-overview.md"],
        ["4. AMX：Agent 交易市场", "gitbook-zh/05-amx-marketplace.md"],
        ["5. AAP：行动问责协议", "gitbook-zh/06-aap-accountability.md"],
        ["6. WEAVE：多 Agent 协调引擎", "gitbook-zh/07-weave-coordination.md"],
        ["7. Capability-UTXO 模型", "gitbook-zh/08-capability-utxo.md"],
        ["8. 法币原生经济模型", "gitbook-zh/09-fiat-economics.md"],
        ["9. 节点分层与网络拓扑", "gitbook-zh/10-node-topology.md"],
        ["10. 信誉系统", "gitbook-zh/11-reputation-system.md"],
        ["11. 争议仲裁与反欺诈", "gitbook-zh/12-arbitration-anti-fraud.md"],
        ["12. 安全架构", "gitbook-zh/13-security-architecture.md"],
        ["13. 治理与演进", "gitbook-zh/15-governance-evolution.md"],
        ["14. 结语", "gitbook-zh/17-conclusion.md"]
      ];

      const toc = document.getElementById("toc");
      const content = document.getElementById("content");
      const meta = document.getElementById("meta");
      const repoLink = document.getElementById("repoLink");
      const outline = document.getElementById("outline");
      const query = new URLSearchParams(window.location.search);
      const defaultFile = "gitbook-zh/01-executive-summary.md";
      const topOffset = 126;
      let currentFile = query.get("file") || defaultFile;
      let outlineSyncScheduled = false;

      function isSafeFilePath(path) {
        return /^[A-Za-z0-9._/-]+$/.test(path) && !path.includes("..") && path.endsWith(".md");
      }

      function setActive(file) {
        document.querySelectorAll("[data-file]").forEach((element) => {
          element.classList.toggle("active", element.dataset.file === file);
        });
      }

      function toReaderUrl(file) {
        return `?file=${encodeURIComponent(file)}`;
      }

      function resolveMarkdownPath(baseFile, href) {
        const [rawPath, rawHash] = href.split("#");
        if (!rawPath) {
          return null;
        }
        const baseDir = baseFile.includes("/") ? baseFile.slice(0, baseFile.lastIndexOf("/") + 1) : "";
        const merged = rawPath.startsWith("/") ? rawPath.slice(1) : `${baseDir}${rawPath}`;
        const parts = [];
        for (const part of merged.split("/")) {
          if (!part || part === ".") {
            continue;
          }
          if (part === "..") {
            if (!parts.length) {
              return null;
            }
            parts.pop();
            continue;
          }
          parts.push(part);
        }
        const file = parts.join("/");
        if (!/^[A-Za-z0-9._/-]+$/.test(file) || file.includes("..")) {
          return null;
        }
        const hash = rawHash ? `#${rawHash}` : "";
        return { file, hash };
      }

      function buildToc() {
        toc.innerHTML = CHAPTERS.map(([title, file]) => {
          return `<li><a class="toc-link" data-file="${file}" href="${toReaderUrl(file)}">${title}</a></li>`;
        }).join("");
      }

      function normalizeMarkdownLinks(container, baseFile) {
        container.querySelectorAll("a").forEach((link) => {
          const href = link.getAttribute("href");
          if (!href || href.startsWith("http://") || href.startsWith("https://")) {
            return;
          }
          if (href.startsWith("#")) {
            link.dataset.anchor = "true";
            return;
          }
          if (href.includes(".md")) {
            const resolved = resolveMarkdownPath(baseFile, href);
            if (!resolved) {
              return;
            }
            if (!isSafeFilePath(resolved.file)) {
              return;
            }
            link.setAttribute("href", `${toReaderUrl(resolved.file)}${resolved.hash}`);
            link.dataset.file = resolved.file;
            if (resolved.hash) {
              link.dataset.hash = resolved.hash;
            }
          }
        });
      }

      function normalizeMarkdownImages(container, baseFile) {
        container.querySelectorAll("img").forEach((img) => {
          const src = img.getAttribute("src");
          if (!src || src.startsWith("http://") || src.startsWith("https://") || src.startsWith("data:")) {
            return;
          }
          const resolved = resolveMarkdownPath(baseFile, src);
          if (!resolved) {
            return;
          }
          if (!/\.(png|jpe?g|webp|gif|svg)$/i.test(resolved.file)) {
            return;
          }
          img.setAttribute("src", `../${resolved.file}`);
          if (!img.getAttribute("loading")) {
            img.setAttribute("loading", "lazy");
          }
        });
      }

      function slugify(text) {
        const cleaned = text
          .toLowerCase()
          .trim()
          .replace(/[`~!@#$%^&*()+=\[\]{}\\|;:'",.<>/?]/g, "")
          .replace(/\s+/g, "-")
          .replace(/-+/g, "-");
        return cleaned || "section";
      }

      function ensureHeadingIds(container) {
        const seen = new Map();
        container.querySelectorAll("h2, h3").forEach((heading) => {
          const originalId = heading.id || slugify(heading.textContent || "section");
          const count = seen.get(originalId) || 0;
          seen.set(originalId, count + 1);
          heading.id = count ? `${originalId}-${count}` : originalId;
        });
      }

      function setOutlineActive(hash) {
        const activeId = hash && hash.startsWith("#") ? decodeURIComponent(hash.slice(1)) : "";
        outline.querySelectorAll(".outline-link").forEach((link) => {
          const targetId = decodeURIComponent((link.getAttribute("href") || "").slice(1));
          link.classList.toggle("active", !!activeId && targetId === activeId);
        });
      }

      function buildOutline(container) {
        const headings = Array.from(container.querySelectorAll("h2, h3")).filter((heading) => {
          return heading.textContent && heading.textContent.trim();
        });
        if (!headings.length) {
          outline.innerHTML = '<li class="outline-empty">本页暂无小节</li>';
          return;
        }
        outline.innerHTML = headings
          .map((heading) => {
            const text = heading.textContent.trim();
            const encodedId = encodeURIComponent(heading.id);
            const levelClass = `level-${heading.tagName.toLowerCase()}`;
            return `<li class="outline-item ${levelClass}"><a class="outline-link" data-anchor="true" href="#${encodedId}">${text}</a></li>`;
          })
          .join("");
      }

      function syncOutlineWithScroll() {
        outlineSyncScheduled = false;
        const headings = Array.from(content.querySelectorAll("h2, h3"));
        if (!headings.length) {
          return;
        }
        let activeId = headings[0].id;
        for (const heading of headings) {
          if (heading.getBoundingClientRect().top - topOffset <= 0) {
            activeId = heading.id;
          } else {
            break;
          }
        }
        setOutlineActive(`#${encodeURIComponent(activeId)}`);
      }

      function scheduleOutlineSync() {
        if (outlineSyncScheduled) {
          return;
        }
        outlineSyncScheduled = true;
        window.requestAnimationFrame(syncOutlineWithScroll);
      }

      function scrollToAnchor(hash, smooth = true) {
        if (!hash || !hash.startsWith("#")) {
          return;
        }
        const id = decodeURIComponent(hash.slice(1));
        const target = document.getElementById(id);
        if (!target) {
          return;
        }
        const top = target.getBoundingClientRect().top + window.scrollY - topOffset;
        window.scrollTo({ top: Math.max(top, 0), behavior: smooth ? "smooth" : "auto" });
        setOutlineActive(hash);
      }

      async function loadMarkdown(file, pushState, hash = "") {
        if (!isSafeFilePath(file)) {
          meta.textContent = "非法文件路径";
          content.textContent = "文件路径非法。";
          outline.innerHTML = '<li class="outline-empty">无法生成目录</li>';
          return;
        }
        currentFile = file;
        if (pushState) {
          window.history.pushState({ file, hash }, "", `${toReaderUrl(file)}${hash}`);
        }
        setActive(file);
        meta.textContent = `当前文档：${file}`;
        const githubUrl = `https://github.com/mtk380/AACP.github.io/blob/main/${file}`;
        repoLink.href = githubUrl;

        try {
          const response = await fetch(`../${file}`);
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const markdown = await response.text();
          marked.setOptions({ breaks: true, gfm: true });
          content.innerHTML = marked.parse(markdown);
          normalizeMarkdownLinks(content, file);
          normalizeMarkdownImages(content, file);
          ensureHeadingIds(content);
          buildOutline(content);
          if (hash) {
            scrollToAnchor(hash, pushState);
          } else {
            window.scrollTo({ top: 0, behavior: "auto" });
            scheduleOutlineSync();
          }
        } catch (error) {
          outline.innerHTML = '<li class="outline-empty">加载失败</li>';
          content.innerHTML = `<p>文档加载失败：${error.message}</p><p><a href="${githubUrl}" target="_blank" rel="noreferrer">点击在 GitHub 查看</a></p>`;
        }
      }

      buildToc();

      document.addEventListener("click", (event) => {
        const anchorLink = event.target.closest("a[data-anchor]");
        if (anchorLink) {
          const hash = anchorLink.getAttribute("href") || "";
          if (hash.startsWith("#")) {
            event.preventDefault();
            window.history.replaceState({ file: currentFile, hash }, "", `${toReaderUrl(currentFile)}${hash}`);
            scrollToAnchor(hash, true);
          }
          return;
        }

        const fileLink = event.target.closest("a[data-file]");
        if (!fileLink) {
          return;
        }
        event.preventDefault();
        const file = fileLink.dataset.file;
        const hash = fileLink.dataset.hash || "";
        loadMarkdown(file, true, hash);
      });

      window.addEventListener("scroll", scheduleOutlineSync, { passive: true });

      window.addEventListener("popstate", () => {
        const file = new URLSearchParams(window.location.search).get("file") || defaultFile;
        const hash = window.location.hash || "";
        loadMarkdown(file, false, hash);
      });

      loadMarkdown(currentFile, false, window.location.hash || "");
    </script>
  </body>
</html>
