<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting...</title>
    <script>
      const params = new URLSearchParams(window.location.search);
      const file = params.get("file");
      const normalized = file ? file.replace(/^\.?\//, "") : "";
      const isSafeFilePath = /^[A-Za-z0-9._/-]+$/.test(normalized) && !normalized.includes("..") && normalized.endsWith(".md");
      const target = isSafeFilePath ? `./?file=${encodeURIComponent(normalized)}` : "./";
      window.location.replace(target);
    </script>
  </head>
  <body>
    <p>Redirecting to the reader. If it does not open, go back to <a href="./">home</a>.</p>
  </body>
</html>
