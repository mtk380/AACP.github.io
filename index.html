<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AACP 白皮书入口</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f8fa;
        color: #24292f;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", "Helvetica Neue", Arial, sans-serif;
      }
      .container {
        width: min(920px, calc(100vw - 32px));
        background: #fff;
        border: 1px solid #d0d7de;
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 8px 26px rgba(31, 35, 40, 0.08);
      }
      h1 {
        margin: 0;
        font-size: 32px;
      }
      .subtitle {
        margin: 8px 0 22px;
        color: #57606a;
        line-height: 1.6;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }
      .card {
        border: 1px solid #d0d7de;
        border-radius: 12px;
        padding: 16px;
      }
      .card h2 {
        margin: 0 0 8px;
        font-size: 20px;
      }
      .card p {
        margin: 0 0 14px;
        color: #57606a;
      }
      .button {
        display: inline-block;
        padding: 9px 12px;
        border-radius: 8px;
        background: #0969da;
        color: #fff;
        text-decoration: none;
        font-size: 14px;
      }
      .button:hover {
        opacity: 0.92;
      }
      .links {
        margin-top: 16px;
        font-size: 14px;
      }
      .links a {
        color: #0969da;
        text-decoration: none;
      }
      .links a:hover {
        text-decoration: underline;
      }
      @media (max-width: 780px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script>
      (function redirectLegacyReaderQuery() {
        const params = new URLSearchParams(window.location.search);
        const file = params.get("file");
        if (!file) {
          return;
        }
        const normalized = file.replace(/^\.?\//, "");
        const isSafeFilePath = /^[A-Za-z0-9._/-]+$/.test(normalized) && !normalized.includes("..") && normalized.endsWith(".md");
        if (!isSafeFilePath) {
          return;
        }
        const targetDir = normalized.startsWith("gitbook-en/") ? "en" : "zh";
        const hash = window.location.hash || "";
        window.location.replace(`./${targetDir}/?file=${encodeURIComponent(normalized)}${hash}`);
      })();
    </script>
  </head>
  <body>
    <main class="container">
      <h1>AACP Whitepaper / AACP 白皮书</h1>
      <p class="subtitle">
        请选择阅读语言入口。Choose your preferred language entry.
      </p>
      <section class="grid">
        <article class="card">
          <h2>中文</h2>
          <p>章节化阅读、侧边目录、Markdown 内链与图片自动处理。</p>
          <a class="button" href="./zh/">进入中文版</a>
        </article>
        <article class="card">
          <h2>English</h2>
          <p>Structured chapter reader with TOC, in-document links, and image resolving.</p>
          <a class="button" href="./en/">Open English Version</a>
        </article>
      </section>
      <div class="links">
        <a href="./zh/?file=gitbook-zh/01-executive-summary.md">中文默认章节</a>
        ·
        <a href="./en/?file=gitbook-en/01-executive-summary.md">English default chapter</a>
      </div>
    </main>
  </body>
</html>
