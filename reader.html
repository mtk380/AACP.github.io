<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>跳转中...</title>
    <script>
      const params = new URLSearchParams(window.location.search);
      const file = params.get("file");
      const target = file ? `./?file=${encodeURIComponent(file)}` : "./";
      window.location.replace(target);
    </script>
  </head>
  <body>
    <p>正在跳转到新阅读页，如果没有自动跳转，请返回 <a href="./">首页</a>。</p>
  </body>
</html>
